<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#918fa1",
                    "on-primary-container": "#1b0091",
                    "surface-container-high": "#292935",
                    "secondary-container": "#8f0935",
                    "primary-fixed-dim": "#c4c0ff",
                    "tertiary": "#3ae275",
                    "surface-container-lowest": "#0d0d18",
                    "primary": "#c4c0ff",
                    "on-tertiary-container": "#003112",
                    "surface-tint": "#c4c0ff",
                    "on-background": "#e3e0f1",
                    "on-tertiary-fixed-variant": "#005323",
                    "on-secondary-fixed-variant": "#8f0935",
                    "surface-dim": "#12121d",
                    "tertiary-fixed-dim": "#3ae275",
                    "on-secondary": "#670023",
                    "on-secondary-container": "#ff97a7",
                    "surface-container-highest": "#343440",
                    "on-error": "#690005",
                    "secondary-fixed-dim": "#ffb2bc",
                    "inverse-primary": "#4f44e2",
                    "on-tertiary": "#003916",
                    "surface-container-low": "#1b1a26",
                    "on-secondary-fixed": "#400012",
                    "on-primary-fixed": "#100069",
                    "tertiary-container": "#00a74e",
                    "on-tertiary-fixed": "#00210a",
                    "on-surface": "#e3e0f1",
                    "secondary": "#ffb2bc",
                    "error": "#ffb4ab",
                    "error-container": "#93000a",
                    "surface-bright": "#383845",
                    "surface": "#12121d",
                    "primary-container": "#8781ff",
                    "on-error-container": "#ffdad6",
                    "on-primary": "#2000a4",
                    "outline-variant": "#464555",
                    "on-primary-fixed-variant": "#3622ca",
                    "surface-variant": "#343440",
                    "primary-fixed": "#e3dfff",
                    "on-surface-variant": "#c7c4d8",
                    "background": "#12121d",
                    "secondary-fixed": "#ffd9dd",
                    "inverse-on-surface": "#302f3b",
                    "surface-container": "#1f1e2a",
                    "tertiary-fixed": "#65ff91",
                    "inverse-surface": "#e3e0f1"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: radial-gradient(circle at 50% 50%, #201a4d 0%, #12121d 70%);
        }
        .glow-effect {
            text-shadow: 0 0 20px rgba(196, 192, 255, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body overflow-hidden">
<!-- Splash Screen Canvas -->
<main class="relative h-screen w-full flex items-center justify-center kinetic-gradient">
<!-- Ambient Decorative Layer -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/5 blur-[120px]"></div>
</div>
<!-- Central Branding Container -->
<div class="relative z-10 flex flex-col items-center justify-center space-y-8 max-w-xs px-6">
<!-- Modern Dumbbell Logo -->
<div class="relative group">
<!-- Glowing Outer Aura -->
<div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-150"></div>
<!-- Icon Shell -->
<div class="relative w-24 h-24 flex items-center justify-center bg-gradient-to-br from-primary to-primary-container rounded-[2rem] shadow-[0_0_40px_rgba(108,99,255,0.3)]">
<span class="material-symbols-outlined text-on-primary text-6xl" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">
                        fitness_center
                    </span>
</div>
</div>
<!-- Text Cluster -->
<div class="text-center space-y-3">
<h1 class="font-headline text-5xl font-bold tracking-tighter text-white glow-effect">
                    FitAI
                </h1>
<p class="font-body text-primary/70 text-sm font-medium tracking-widest uppercase">
                    Your AI-powered fitness companion
                </p>
</div>
<!-- Loading Indicator (Kinetic Lens Aesthetic) -->
<div class="pt-12 w-48">
<div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary via-tertiary to-primary w-1/3 rounded-full shadow-[0_0_12px_rgba(196,192,255,0.5)]"></div>
</div>
<div class="mt-4 flex justify-center">
<span class="text-[10px] font-label text-outline/50 uppercase tracking-[0.2em]">System Initializing</span>
</div>
</div>
</div>
<!-- Abstract Decorative Elements (Asymmetric) -->
<div class="absolute top-12 left-12 opacity-20 hidden md:block">
<div class="w-16 h-16 border-t-2 border-l-2 border-primary-fixed-dim/30"></div>
</div>
<div class="absolute bottom-12 right-12 opacity-20 hidden md:block">
<div class="w-16 h-16 border-b-2 border-r-2 border-primary-fixed-dim/30"></div>
</div>
</main>
<!-- Content Suppression Note: BottomNavBar and TopAppBar are suppressed for this transactional splash screen as per the "Destination" Rule. -->
</body></html>
