<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FitAI Rest Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#383845",
                        "surface": "#12121d",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#00210a",
                        "on-surface": "#e3e0f1",
                        "secondary": "#ffb2bc",
                        "surface-container-low": "#1b1a26",
                        "on-tertiary": "#003916",
                        "on-secondary-fixed": "#400012",
                        "on-primary-fixed": "#100069",
                        "tertiary-container": "#00a74e",
                        "tertiary-fixed": "#65ff91",
                        "surface-container": "#1f1e2a",
                        "inverse-surface": "#e3e0f1",
                        "secondary-fixed": "#ffd9dd",
                        "inverse-on-surface": "#302f3b",
                        "primary-fixed": "#e3dfff",
                        "on-surface-variant": "#c7c4d8",
                        "background": "#12121d",
                        "primary-container": "#8781ff",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#343440",
                        "outline-variant": "#464555",
                        "on-primary-fixed-variant": "#3622ca",
                        "on-primary": "#2000a4",
                        "surface-tint": "#c4c0ff",
                        "on-background": "#e3e0f1",
                        "secondary-container": "#8f0935",
                        "tertiary": "#3ae275",
                        "surface-container-lowest": "#0d0d18",
                        "primary-fixed-dim": "#c4c0ff",
                        "primary": "#c4c0ff",
                        "on-tertiary-container": "#003112",
                        "on-primary-container": "#1b0091",
                        "surface-container-high": "#292935",
                        "outline": "#918fa1",
                        "on-error": "#690005",
                        "secondary-fixed-dim": "#ffb2bc",
                        "inverse-primary": "#4f44e2",
                        "on-secondary-container": "#ff97a7",
                        "surface-container-highest": "#343440",
                        "tertiary-fixed-dim": "#3ae275",
                        "on-secondary": "#670023",
                        "on-tertiary-fixed-variant": "#005323",
                        "on-secondary-fixed-variant": "#8f0935",
                        "surface-dim": "#12121d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .timer-glow {
            filter: drop-shadow(0 0 12px rgba(255, 178, 188, 0.4));
        }
        .glass-panel {
            backdrop-filter: blur(24px);
            background: rgba(52, 52, 64, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30">
<!-- Top Navigation Shell (Contextual Modal Header) -->
<header class="fixed top-0 w-full z-50 bg-slate-900/60 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full shadow-[0_8px_32px_0_rgba(108,99,255,0.08)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">close</span>
<h1 class="text-on-surface font-headline font-bold tracking-tight text-lg">Push Hypertrophy A</h1>
</div>
<div class="bg-secondary-container/40 px-3 py-1 rounded-full">
<span class="text-secondary font-label text-[10px] font-extrabold uppercase tracking-widest">RESTING</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen pt-24 pb-32 flex flex-col items-center justify-center px-6 space-y-12">
<!-- Large Countdown Ring -->
<div class="relative flex items-center justify-center w-72 h-72">
<!-- Progress Ring (SVG) -->
<svg class="absolute w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<!-- Background track -->
<circle class="text-surface-container-high" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-width="4"></circle>
<!-- Active neon track -->
<circle class="text-secondary timer-glow" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-dasharray="289" stroke-dashoffset="72" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="flex flex-col items-center text-center">
<span class="text-on-surface-variant font-label text-xs uppercase tracking-[0.2em] font-bold mb-1">REST</span>
<span class="font-headline text-8xl font-bold tracking-tighter text-on-surface">60</span>
<span class="text-on-surface-variant font-label text-xs uppercase tracking-widest mt-2">SECONDS</span>
</div>
</div>
<!-- Stat Chips (Tonal Layering) -->
<div class="flex gap-4 w-full max-w-sm">
<div class="flex-1 flex items-center gap-3 bg-surface-container-low p-4 rounded-xl shadow-inner">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">reorder</span>
<div class="flex flex-col">
<span class="text-on-surface-variant text-[10px] uppercase font-bold tracking-wider">Next Set</span>
<span class="text-on-surface font-headline font-bold">2/3</span>
</div>
</div>
<div class="flex-1 flex items-center gap-3 bg-surface-container-low p-4 rounded-xl shadow-inner">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<div class="flex flex-col">
<span class="text-on-surface-variant text-[10px] uppercase font-bold tracking-wider">Exercise</span>
<span class="text-on-surface font-headline font-bold">2/6</span>
</div>
</div>
</div>
<!-- Coming Up Card (Bento/Editorial Style) -->
<div class="w-full max-w-sm group">
<div class="flex items-center justify-between mb-4 px-1">
<h3 class="text-on-surface-variant font-label text-xs uppercase font-extrabold tracking-widest">COMING UP</h3>
<span class="material-symbols-outlined text-slate-500 text-sm">trending_flat</span>
</div>
<div class="bg-surface-container-high/60 glass-panel rounded-2xl overflow-hidden shadow-2xl relative">
<div class="flex items-center p-5 gap-5">
<!-- Exercise Preview Thumbnail -->
<div class="w-16 h-16 rounded-xl bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img alt="Exercise Preview" class="w-full h-full object-cover opacity-60 mix-blend-luminosity" data-alt="Close up of weight bench and dumbbells in a high-end dark gym setting with dramatic indigo lighting and focus on metal textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYM089L84H0p1b77h01xAHdcswPiMIItsFjJlPWhFu4Kj4aXrAuC53MB27eQdfEX71uSUTnl13kMWEGYkBOIh98dp_8CKYJ-TSMxA8SDgWJzNw_4RwuykEawftWbwNUw-v1Iqo1pPqSMQAb_avyLhebI6BaLpYK6h4h3SWkYFcR5nrB0_WpSa3fiU9aALop1Ch8lp_uzeT3fjJFRqexDI1YNzEVIkWsM32Vty64FtdjPkN7Rm8yObQ9_dOVJUM-OctZCR-GD5dbwGw"/>
</div>
<div class="flex flex-col gap-1">
<h4 class="text-on-surface font-headline font-bold text-lg leading-tight">Incline Dumbbell Press</h4>
<div class="flex gap-2">
<span class="bg-primary/10 text-primary font-label text-[9px] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">CHEST</span>
<span class="bg-primary/10 text-primary font-label text-[9px] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">SHOULDERS</span>
</div>
</div>
</div>
</div>
</div>
<!-- Skip Button -->
<button class="w-full max-w-sm border-2 border-secondary/30 hover:bg-secondary/10 text-secondary font-headline font-bold py-4 rounded-xl transition-all duration-300 active:scale-[0.98] uppercase tracking-widest text-sm flex items-center justify-center gap-2">
            SKIP REST
            <span class="material-symbols-outlined text-sm">fast_forward</span>
</button>
</main>
<!-- Contextual Control Bar (Replaces Global Nav) -->
<nav class="fixed bottom-0 left-0 w-full h-24 bg-slate-900/80 backdrop-blur-2xl flex justify-around items-center px-8 pb-4 shadow-[0_-4px_24px_0_rgba(0,0,0,0.4)]">
<button class="flex flex-col items-center justify-center text-slate-500 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl">skip_previous</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">history</span>
</button>
<!-- Centered Workout Action (Active State visual) -->
<div class="bg-primary-container/20 p-4 rounded-full -mt-10 border-4 border-background">
<button class="bg-gradient-to-br from-primary to-primary-container w-14 h-14 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(135,129,255,0.4)] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
</div>
<button class="flex flex-col items-center justify-center text-slate-500 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">videocam</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-500 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-3xl">skip_next</span>
</button>
</nav>
</body></html>
